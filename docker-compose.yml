services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - .:/app
      - browser-data:/app/browser-data
  dashboard:
    build: .
    command: streamlit run app/dashboard/streamlit_app.py --server.address 0.0.0.0
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - api
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  browser-data:

